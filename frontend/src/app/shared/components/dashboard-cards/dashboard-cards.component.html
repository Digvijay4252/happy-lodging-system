<div class="row g-3">
  <div class="col-12 col-sm-6 col-xl-3" *ngFor="let item of items">
    <div class="card surface-card h-100 stat-card">
      <div class="card-body">
        <h6 class="text-muted mb-2">{{ item.label }}</h6>
        <h3 class="mb-0">{{ item.value }}</h3>
      </div>
    </div>
  </div>
</div>
