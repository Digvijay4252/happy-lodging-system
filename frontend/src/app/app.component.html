<app-navbar></app-navbar>
<app-toast></app-toast>
<div class="page-wrap container-fluid">
  <router-outlet></router-outlet>
</div>

<button
  type="button"
  class="ai-fab"
  *ngIf="showFloatingAiButton"
  (click)="openAiChat()"
  aria-label="Open AI Chat"
  title="AI Chat"
>
  AI
</button>

<section class="ai-popup" *ngIf="showFloatingAiButton && isAiOpen">
  <div class="ai-popup-header">
    <div class="ai-title">AI Room Assistant</div>
    <button type="button" class="btn-close-mini" (click)="closeAiChat()" aria-label="Close chat">x</button>
  </div>

  <div class="ai-popup-body" #aiScrollWrap>
    <div class="msg-row" *ngFor="let item of aiMessages" [class.msg-row-user]="item.role === 'You'">
      <div class="msg" [class.msg-user]="item.role === 'You'" [class.msg-ai]="item.role === 'AI'">
        <span class="msg-role">{{ item.role }}:</span> {{ item.text }}
      </div>
    </div>
    <div class="msg-row" *ngIf="aiLoading">
      <div class="msg msg-ai"><span class="msg-role">AI:</span> Typing...</div>
    </div>
  </div>

  <div class="ai-popup-footer">
    <input
      class="form-control"
      [(ngModel)]="aiInput"
      placeholder="Ask about rooms, price, amenities..."
      (keydown.enter)="sendAiMessage()"
    />
    <button class="btn btn-primary btn-sm" type="button" (click)="sendAiMessage()" [disabled]="aiLoading">Send</button>
  </div>
</section>

<ng-container *ngIf="confirm.dialog$ | async as dialog">
  <div class="confirm-backdrop" (click)="confirm.cancel()">
    <div class="confirm-modal card p-4" (click)="$event.stopPropagation()">
      <div class="confirm-head">
        <div class="confirm-icon-wrap" aria-hidden="true">
          <svg class="confirm-icon" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"></circle>
            <path d="M12 7.25v6.25" stroke="#b45309" stroke-width="2" stroke-linecap="round"></path>
            <circle cx="12" cy="16.9" r="1.2" fill="#b45309"></circle>
          </svg>
        </div>
        <h4 class="mb-0">{{ dialog.title }}</h4>
      </div>

      <div class="confirm-body">{{ dialog.message }}</div>

      <div class="confirm-actions">
        <button class="btn btn-outline-secondary px-4" type="button" (click)="confirm.cancel()">No</button>
        <button class="btn btn-primary px-4" type="button" (click)="confirm.confirm()">Yes</button>
      </div>
    </div>
  </div>
</ng-container>
