<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="section-title mb-0">Room Booking</h3>
  <div class="d-flex gap-2">
    <a class="btn btn-outline-secondary" routerLink="/customer/meals">Meal Booking</a>
    <a class="btn btn-outline-secondary" routerLink="/customer/feedback">My Feedback</a>
    <a class="btn btn-outline-secondary" routerLink="/customer/issues">My Issues</a>
    <a class="btn btn-outline-secondary" routerLink="/customer/bookings">My Bookings</a>
  </div>
</div>
<div class="row g-3">
  <div class="col-lg-4">
    <div class="card surface-card p-3 mb-3">
      <h5>Search Rooms</h5>
      <form [formGroup]="filters">
        <input class="form-control mb-2" type="date" formControlName="checkIn" />
        <input class="form-control mb-2" type="date" formControlName="checkOut" />
        <select class="form-select mb-2" formControlName="type">
          <option value="">Any Type</option>
          <option>Single</option>
          <option>Double</option>
          <option>Deluxe</option>
          <option>Suite</option>
        </select>
        <input class="form-control mb-2" placeholder="Min Price" formControlName="minPrice" />
        <input class="form-control mb-2" placeholder="Max Price" formControlName="maxPrice" />
      </form>
    </div>
  </div>

  <div class="col-lg-8">
    <div class="card surface-card p-3">
      <h5>Available Rooms</h5>
      <div class="rooms-scroll">
        <div *ngFor="let room of rooms" class="list-row p-3 mb-2 d-flex justify-content-between align-items-center">
          <div>
            <img
              *ngIf="room.images?.length"
              [src]="resolveImageUrl(room.images[0].image_url)"
              alt="Room image"
              class="room-thumb mb-2"
            />
            <strong>#{{ room.room_number }} - {{ room.type }}</strong>
            <div class="muted">Price: {{ room.price }} / night</div>
            <div class="muted">Status: {{ room.status }}</div>
          </div>
          <button class="btn btn-success" (click)="openBookingModal(room)">Book</button>
        </div>
      </div>
    </div>
  </div>
</div>

<app-booking-popup
  [open]="showBookingModal"
  [room]="selectedRoom"
  [defaultCheckIn]="filters.value.checkIn || ''"
  [defaultCheckOut]="filters.value.checkOut || ''"
  (closed)="closeBookingModal()"
  (bookingConfirmed)="loadRooms()"
></app-booking-popup>
