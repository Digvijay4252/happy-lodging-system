<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="section-title mb-0">My Bookings</h3>
  <a class="btn btn-outline-secondary" routerLink="/customer">Back to Rooms</a>
</div>

<div class="card surface-card p-3">
  <h5>Booking History</h5>
  <div *ngFor="let b of bookings" class="list-row p-3 mb-2">
    <img
      *ngIf="b.room?.images?.length"
      [src]="resolveImageUrl(b.room.images[0].image_url)"
      alt="Booked room image"
      class="room-thumb mb-2"
    />
    <div><strong>{{ b.booking_id }}</strong> - {{ b.status }} - Payment: {{ b.payment_status }}</div>
    <div class="muted">Room {{ b.room?.room_number }} | {{ b.check_in }} to {{ b.check_out }} | {{ b.total_amount }}</div>
    <button class="btn btn-sm btn-outline-danger me-2" (click)="cancel(b.id)">Cancel</button>
    <button class="btn btn-sm btn-outline-success" (click)="pay(b.id)">Pay</button>
  </div>
  <div class="muted" *ngIf="!bookings.length">No bookings found.</div>
</div>
