<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Admin Dashboard</h3>
  <a class="btn btn-primary" routerLink="/admin/rooms">Manage Rooms</a>
</div>
<div class="row g-3 mb-3">
  <app-dashboard-cards [items]="cards"></app-dashboard-cards>
</div>

<div class="row">
  <div class="col-lg-8">
    <div class="card surface-card p-3 mb-3">
      <h5>All Bookings</h5>
      <div *ngFor="let b of bookings" class="list-row p-3 mb-2 d-flex justify-content-between align-items-center">
        <div>{{ b.booking_id }} | {{ b.customer?.name }} | {{ b.status }} | {{ b.total_amount }}</div>
        <select class="form-select w-auto" (change)="changeStatus(b.id, $any($event.target).value)">
          <option>Booked</option>
          <option>CheckedIn</option>
          <option>CheckedOut</option>
          <option>Cancelled</option>
        </select>
      </div>
    </div>
  </div>

  <div class="col-lg-4">
    <div class="card surface-card p-3">
      <h5>Reports Snapshot</h5>
      <pre class="small mb-0">{{ reports | json }}</pre>
    </div>
  </div>
</div>
