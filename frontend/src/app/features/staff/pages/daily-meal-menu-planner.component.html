<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Daily Meal Menu Planner</h3>
  <a class="btn btn-outline-secondary" [routerLink]="backRoute">Back to Dashboard</a>
</div>

<div class="page-tabs mb-3">
  <a class="btn btn-outline-primary btn-sm" [routerLink]="baseRoute + '/items'">Food Items</a>
  <a class="btn btn-primary btn-sm" [routerLink]="baseRoute + '/menus'">Daily Meal Menu Planner</a>
  <a class="btn btn-outline-primary btn-sm" [routerLink]="baseRoute + '/orders'">Meal Orders</a>
</div>

<div class="row g-3">
  <div class="col-lg-5">
    <div class="card surface-card p-3">
      <h5>Plan Menu</h5>
      <form [formGroup]="menuForm" (ngSubmit)="saveMenu()">
        <div class="row g-2 mb-2">
          <div class="col-md-6">
            <input class="form-control" type="date" formControlName="menu_date" />
          </div>
          <div class="col-md-6">
            <select class="form-select" formControlName="meal_slot">
              <option *ngFor="let s of mealSlots" [value]="s">{{ s }}</option>
            </select>
          </div>
        </div>
        <div class="picker-grid mb-2">
          <label class="pick-item" *ngFor="let item of foodItems">
            <input
              type="checkbox"
              [checked]="hasFoodSelected(item.id)"
              (change)="toggleFoodSelection(item.id, $any($event.target).checked)"
            />
            <span>{{ item.name }} ({{ item.price }})</span>
          </label>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-primary" type="submit">Save Menu</button>
          <button class="btn btn-outline-dark" type="button" (click)="carryForward()">Auto Carry Forward</button>
        </div>
      </form>
    </div>
  </div>

  <div class="col-lg-7">
    <div class="card surface-card p-3">
      <h5>Daily Menus</h5>
      <div *ngFor="let m of menus" class="list-row p-2 mb-2">
        <div class="fw-semibold">{{ m.menu_date }} | {{ m.meal_slot }} | {{ m.source_type }}</div>
        <div class="small muted">
          Dishes:
          <span *ngFor="let mi of m.menu_items; let last = last">{{ mi.food_item?.name }}<span *ngIf="!last">, </span></span>
        </div>
      </div>
      <div class="muted" *ngIf="!menus.length">No menus found.</div>
    </div>
  </div>
</div>
