<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="section-title mb-0">Service Tickets</h3>
  <a class="btn btn-outline-secondary" routerLink="/staff">Back to Staff Home</a>
</div>

<div class="row g-3">
  <div class="col-lg-5">
    <div class="card surface-card p-3">
      <h5>Create Service Ticket</h5>
      <form [formGroup]="ticketForm" (ngSubmit)="createTicket()">
        <input class="form-control mb-2" type="number" placeholder="Booking ID" formControlName="booking_id" />
        <textarea class="form-control mb-2" rows="3" placeholder="Description" formControlName="description"></textarea>
        <button class="btn btn-warning">Create Ticket</button>
      </form>
    </div>
  </div>

  <div class="col-lg-7">
    <div class="card surface-card p-3">
      <h5>Tickets</h5>
      <div *ngFor="let t of tickets" class="list-row p-3 mb-2">
        <div class="fw-semibold">#{{ t.id }} | Booking {{ t.booking_id }}</div>
        <div class="muted mb-2">{{ t.description }}</div>
        <div class="small mb-2">Assigned: {{ t.assigned_staff?.name || 'Unassigned' }} | Current: {{ t.status }}</div>

        <div class="d-flex gap-2 align-items-center flex-wrap">
          <select #statusSel class="form-select form-select-sm w-auto">
            <option [selected]="t.status === 'Open'">Open</option>
            <option [selected]="t.status === 'InProgress'">InProgress</option>
            <option [selected]="t.status === 'Resolved'">Resolved</option>
            <option [selected]="t.status === 'Closed'">Closed</option>
          </select>
          <input #assignSel class="form-control form-control-sm w-auto" type="number" placeholder="Assign Staff ID" />
          <button class="btn btn-sm btn-primary" (click)="updateTicket(t.id, statusSel.value, +assignSel.value || undefined)">Update</button>
        </div>
      </div>
      <div class="muted" *ngIf="!tickets.length">No tickets found.</div>
    </div>
  </div>
</div>
