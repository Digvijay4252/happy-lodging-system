<div class="auth-shell">
  <div class="auth-card surface-card">
    <p class="auth-kicker mb-1">New Account</p>
    <h3 class="mb-2">Customer Signup</h3>
    <p class="muted mb-4">Create your account to book rooms online.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <input class="form-control auth-input mb-3" placeholder="Full Name" formControlName="name" />
      <input class="form-control auth-input mb-3" placeholder="Email" formControlName="email" />
      <input class="form-control auth-input mb-4" type="password" placeholder="Password" formControlName="password" />
      <button class="btn btn-success auth-btn w-100" [disabled]="form.invalid">Create Customer Account</button>
    </form>

    <a routerLink="/auth/login/customer" class="mt-4 d-block text-center">Back to customer login</a>
  </div>
</div>
