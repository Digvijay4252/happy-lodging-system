<div class="row justify-content-center mt-5">
  <div class="col-md-4 card p-4 shadow-sm">
    <h4 class="mb-3 text-capitalize">{{ role }} Login</h4>

    <div class="d-flex gap-2 mb-3 role-links">
      <a class="btn btn-sm btn-outline-primary w-100" routerLink="/auth/login/customer">Customer</a>
      <a class="btn btn-sm btn-outline-dark w-100" routerLink="/auth/login/staff">Staff</a>
      <a class="btn btn-sm btn-outline-danger w-100" routerLink="/auth/login/admin">Admin</a>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <input class="form-control mb-2" placeholder="Email" formControlName="email" />
      <input class="form-control mb-3" type="password" placeholder="Password" formControlName="password" />
      <button class="btn btn-primary w-100" [disabled]="form.invalid">Login</button>
    </form>
    <a routerLink="/auth/register" class="mt-3 d-block text-center" *ngIf="role === 'customer'">Create customer account</a>
  </div>
</div>
