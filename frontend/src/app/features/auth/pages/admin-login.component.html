<div class="auth-shell">
  <div class="auth-card surface-card">
    <p class="auth-kicker mb-1">Control Panel</p>
    <h3 class="mb-2">Admin Login</h3>
    <p class="muted mb-4">Access analytics, room controls, and staff management.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <input class="form-control auth-input mb-3" placeholder="Admin Email" formControlName="email" />
      <input class="form-control auth-input mb-4" type="password" placeholder="Password" formControlName="password" />
      <button class="btn btn-danger auth-btn w-100" [disabled]="form.invalid">Login as Admin</button>
    </form>

    <a routerLink="/auth/signup/admin" class="mt-3 d-block text-center">Create admin account</a>

    <div class="text-center mt-4 small">
      <a routerLink="/auth/login/customer">Customer login</a> | <a routerLink="/auth/login/staff">Staff login</a>
    </div>
  </div>
</div>
