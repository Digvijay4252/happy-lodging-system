<div class="row justify-content-center mt-5">
  <div class="col-md-5 card p-4 shadow-sm">
    <h4>Customer Registration</h4>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <input class="form-control mb-2" placeholder="Name" formControlName="name" />
      <input class="form-control mb-2" placeholder="Email" formControlName="email" />
      <input class="form-control mb-3" type="password" placeholder="Password" formControlName="password" />
      <button class="btn btn-success w-100" [disabled]="form.invalid">Register</button>
    </form>
    <a routerLink="/auth/login/customer" class="mt-3 d-block text-center">Back to login</a>
  </div>
</div>
