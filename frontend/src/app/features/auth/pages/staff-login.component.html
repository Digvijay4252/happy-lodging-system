<div class="auth-shell">
  <div class="auth-card surface-card">
    <p class="auth-kicker mb-1">Hotel Operations</p>
    <h3 class="mb-2">Staff Login</h3>
    <p class="muted mb-4">Manage check-ins, check-outs, and service requests.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <input class="form-control auth-input mb-3" placeholder="Staff Email" formControlName="email" />
      <input class="form-control auth-input mb-4" type="password" placeholder="Password" formControlName="password" />
      <button class="btn btn-dark auth-btn w-100" [disabled]="form.invalid">Login as Staff</button>
    </form>

    <div class="text-center mt-4 small">
      <a routerLink="/auth/login/customer">Customer login</a> | <a routerLink="/auth/login/admin">Admin login</a>
    </div>
  </div>
</div>
