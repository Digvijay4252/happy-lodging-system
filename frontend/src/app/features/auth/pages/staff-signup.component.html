<div class="auth-shell">
  <div class="auth-card surface-card">
    <p class="auth-kicker mb-1">Staff Access</p>
    <h3 class="mb-2">Staff Signup</h3>
    <p class="muted mb-4">Create your staff account for operational access.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <input class="form-control auth-input mb-3" placeholder="Staff Name" formControlName="name" />
      <input class="form-control auth-input mb-3" placeholder="Staff Email" formControlName="email" />
      <input class="form-control auth-input mb-4" type="password" placeholder="Temporary Password" formControlName="password" />
      <button class="btn btn-dark auth-btn w-100" [disabled]="form.invalid">Create Staff Account</button>
    </form>

    <a routerLink="/auth/login/staff" class="mt-4 d-block text-center">Go to staff login</a>
  </div>
</div>
